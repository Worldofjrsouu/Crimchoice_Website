<!DOCTYPE html>
<html>
<head>
<title>CrimChoice - Login</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to top,#5E0A2C,#cc0000);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Login Box */

.login-box{
    background:rgb(252, 246, 246);
    width:400px;
    padding:40px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 5px 15px rgba(75, 14, 14, 0.3);
}

/* Title */

h1{
    color:#be1b1b;
}

.subtitle{
    color:gray;
    font-size:14px;
    margin-bottom:20px;
}

/* Inputs */

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

/* Button */

button{
    width:100%;
    padding:10px;
    background:#962020;
    color:white;
    border:none;
    border-radius:7px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#660000;
}

/* Links */

a{
    font-size:12px;
    color:#8b0000;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="login-box">

<h1>CrimChoice</h1>
<p class="subtitle">Course Recommendation System</p>

<form action = "main.html">

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<input type="role" placeholder="Role">

<button type="submit">Login</button>

<br><br>

<a href="#">Forgot Password?</a><br>
<a href="signup.html">Create Account</a>

</form>

</div>

</body>
</html>
