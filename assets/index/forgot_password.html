<!DOCTYPE html>
<html>
<head>

<title>Pathly - Reset Password</title>

<link rel="stylesheet" href="../style/forgot_password.css">

</head>

<body>

<div class="container">

<!-- LEFT SIDE -->
<div class="login-side">

<div class="login-box">

<h1>Reset Password</h1>
<p class="subtitle">Follow the steps to recover your account</p>

<!-- STEP 1 -->
<div class="step active" id="step1">

<input type="email" placeholder="Enter your Email" required>

<button onclick="nextStep(2)">Send Verification Code</button>

<br><br>

<a href="loginforms.html">Back to Login</a>

</div>


<!-- STEP 2 -->
<div class="step" id="step2">

<input type="text" placeholder="Enter Verification Code">

<button onclick="nextStep(3)">Verify Code</button>

<br><br>

<a href="#" onclick="nextStep(1)">Resend Code</a>

</div>


<!-- STEP 3 -->
<div class="step" id="step3">

<input type="password" placeholder="New Password">

<input type="password" placeholder="Confirm Password">

<button onclick="resetDone()">Reset Password</button>

<br><br>

<a href="loginforms.html">Back to Login</a>

</div>

</div>

</div>


<!-- RIGHT SIDE SLIDESHOW -->
<div class="slideshow-side">

<div class="bg-slide bg1"></div>
<div class="bg-slide bg2"></div>
<div class="bg-slide bg3"></div>
<div class="bg-slide bg4"></div>
<div class="bg-slide bg5"></div>
<div class="bg-slide bg6"></div>
<div class="bg-slide bg7"></div>
<div class="bg-slide bg8"></div>
<div class="bg-slide bg9"></div>

</div>

</div>

<script>

function nextStep(step){

document.querySelectorAll(".step").forEach(s=>{
s.classList.remove("active")
})

document.getElementById("step"+step).classList.add("active")

}

function resetDone(){

alert("Password successfully reset!")

window.location.href="loginforms.html"

}

</script>

</body>
</html>
