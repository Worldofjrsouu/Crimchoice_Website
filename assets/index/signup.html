<!DOCTYPE html>
<html>
<head>
<title>Pathly - Sign Up</title>

<link rel="stylesheet" href="../style/signup.css">

</head>

<body>

<div class="container">

<!-- LEFT SIDE -->
<div class="login-side">

<div class="login-box">

<h1>Pathly</h1>
<p class="subtitle">Create an Account</p>

<form action="../index/main.html">

<input type="text" placeholder="First Name" required>
<input type="text" placeholder="Middle Name">
<input type="text" placeholder="Last Name" required>

<select>
    <option value="">Suffix (Optional)</option>
    <option>Jr.</option>
    <option>Sr.</option>
    <option>II</option>
    <option>III</option>
</select>

<input type="date" required>

<input type="email" placeholder="Email" required>
<input type="text" placeholder="Username" required>
<input type="password" placeholder="Password" required>
<input type="password" placeholder="Confirm Password" required>

<div class="checkbox">
<input type="checkbox" required>
<label>I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></label>
</div>

<button type="submit">Submit</button>

<br><br>
<a href="../index/loginforms.html">Already Have an Account?</a>

</form>

</div>

</div>

<!-- RIGHT SIDE SLIDESHOW -->
<div class="slideshow-side">

<div class="bg-slide bg1"></div>
<div class="bg-slide bg2"></div>
<div class="bg-slide bg3"></div>
<div class="bg-slide bg4"></div>
<div class="bg-slide bg5"></div>
<div class="bg-slide bg6"></div>
<div class="bg-slide bg7"></div>
<div class="bg-slide bg8"></div>
<div class="bg-slide bg9"></div>

</div>

</div>

</body>
</html>
