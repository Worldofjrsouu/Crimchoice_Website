const colleges = {

  "Engineering": { name: "College of Engineering", link: "../Colleges/html-colleges/college_of_engineering.html" },

  ]
};

let currentPage = 0;
let userAnswers = {};

function renderQuestions() {
  const start = currentPage * 10;
  const end = start + 10;
  const questionsToShow = allQuestions.slice(start, end);
  const container = document.getElementById('questionsContainer');
  
  container.innerHTML = '';
  
  questionsToShow.forEach((q, index) => {
    const questionIndex = start + index;
    const questionDiv = document.createElement('div');
    questionDiv.className = 'question';
    
    let optionsHTML = '';
    
    if (q.type === 'multiple') {
      optionsHTML = '<div class="options">';
      q.options.forEach((option, idx) => {
        const inputId = `q${questionIndex}_${idx}`;
        const isChecked = userAnswers[questionIndex] === option.text ? 'checked' : '';
        optionsHTML += `
          <label>
            <input type="radio" name="q${questionIndex}" value="${option.text}" ${isChecked}>
            ${option.text}
          </label>
        `;
      });
      optionsHTML += '</div>';
    } else if (q.type === 'rating') {
      optionsHTML = '<div class="rating-options">';
      for (let i = 1; i <= q.scale; i++) {
        const isChecked = userAnswers[questionIndex] === i ? 'checked' : '';
        optionsHTML += `
          <label class="rating-label">
            <input type="radio" name="q${questionIndex}" value="${i}" ${isChecked}>
            ${i}
          </label>
        `;
      }
      optionsHTML += '</div>';
    }
    
    questionDiv.innerHTML = `
      <p>${q.question}</p>
      ${optionsHTML}
    `;
    
    container.appendChild(questionDiv);
  });

  const radioButtons = container.querySelectorAll('input[type="radio"]');
  radioButtons.forEach(radio => {
    radio.addEventListener('change', (e) => {
      const questionIndex = parseInt(e.target.name.replace('q', ''));
      userAnswers[questionIndex] = e.target.value;
    });
  });

  updateNavigation();
  updateProgress();
}

function updateNavigation() {
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const submitBtn = document.getElementById('submitBtn');
  
  const totalPages = Math.ceil(allQuestions.length / 10);
  
  if (currentPage > 0) {
    prevBtn.style.display = 'inline-block';
  } else {
    prevBtn.style.display = 'none';
  }
  
  if (currentPage < totalPages - 1) {
    nextBtn.style.display = 'inline-block';
    submitBtn.style.display = 'none';
  } else {
    nextBtn.style.display = 'none';
    submitBtn.style.display = 'inline-block';
  }
}

function updateProgress() {
  const totalPages = Math.ceil(allQuestions.length / 10);
  const percentage = ((currentPage + 1) / totalPages) * 100;
  document.getElementById('progressFill').style.width = percentage + '%';
  document.getElementById('progressText').textContent = `Page ${currentPage + 1} of ${totalPages}`;
}

function showRecommendations() {
  const scores = {};
  Object.keys(colleges).forEach(college => {
    scores[college] = 0;
  });

  for (let questionIndex in userAnswers) {
    const answer = userAnswers[questionIndex];
    const question = allQuestions[questionIndex];
    
    if (question.type === 'multiple') {
      const selectedOption = question.options.find(opt => opt.text === answer);
      if (selectedOption) {
        selectedOption.colleges.forEach(college => {
          scores[college] = (scores[college] || 0) + 1;
        });
      }
    } else if (question.type === 'rating') {
      const rating = parseInt(answer);
      if (rating >= 4) {
        if (question.mapping.high) {
          question.mapping.high.forEach(college => {
            scores[college] = (scores[college] || 0) + 1;
          });
        }
      } else if (rating <= 2) {
        if (question.mapping.low) {
          question.mapping.low.forEach(college => {
            scores[college] = (scores[college] || 0) + 1;
          });
        }
      }
    }
  }

  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const top3Colleges = sorted.slice(0, 3);

  const resultBox = document.getElementById('resultBox');
  const recommendationsList = document.getElementById('recommendationsList');
  
  let html = '';
  top3Colleges.forEach((item, collegeIndex) => {
    const collegeName = item[0];
    const score = item[1];
    const collegeInfo = colleges[collegeName];
    const courses = courseMapping[collegeName] || [];
    
    // Show top 3 courses from each college
    courses.slice(0, 3).forEach((course, courseIndex) => {
      const overallRank = (collegeIndex * 3) + courseIndex + 1;
      html += `
        <div class="recommendation-item">
          <h3>${overallRank}. ${course.name}</h3>
          <p class="course-code"><strong>Course Code:</strong> ${course.code}</p>
          <p class="college-match"><strong>${collegeInfo.name}</strong></p>
          <p>Match Score: ${score} points</p>
          <a href="${collegeInfo.link}" class="recommendation-link">Learn More</a>
        </div>
      `;
    });
  });

  recommendationsList.innerHTML = html;
  resultBox.style.display = 'block';
  document.getElementById('quizForm').scrollIntoView();
}

document.getElementById('nextBtn').addEventListener('click', (e) => {
  e.preventDefault();
  currentPage++;
  renderQuestions();
  window.scrollTo(0, 0);
});

document.getElementById('prevBtn').addEventListener('click', (e) => {
  e.preventDefault();
  currentPage--;
  renderQuestions();
  window.scrollTo(0, 0);
});

document.getElementById('submitBtn').addEventListener('click', (e) => {
  e.preventDefault();
  showRecommendations();
});

function applyUserSettings() {
  const appearanceData = JSON.parse(localStorage.getItem('pathly_appearance') || '{}');

  document.body.className = document.body.className.replace(/theme-\w+/g, '');
  if (appearanceData.theme === 'dark') {
    document.body.classList.add('theme-dark');
  }

  const logoImgs = document.querySelectorAll('.logo');
  logoImgs.forEach((logoImg) => {
    logoImg.src = appearanceData.theme === 'dark'
      ? '../assets/Pathly_FullLogo_White_NoBG_PNG.png'
      : '../assets/Pathly_FullLogo_Black_NoBG_PNG.png';
  });
}

function updateThemeButton() {
  const isDark = document.body.classList.contains('theme-dark');
  document.querySelectorAll('.theme-icon').forEach(el => {
    el.textContent = isDark ? '☀️' : '🌙';
  });
}

function toggleTheme() {
  const appearanceData = JSON.parse(localStorage.getItem('pathly_appearance') || '{}');
  const nextTheme = document.body.classList.contains('theme-dark') ? 'light' : 'dark';
  appearanceData.theme = nextTheme;
  localStorage.setItem('pathly_appearance', JSON.stringify(appearanceData));
  applyUserSettings();
  updateThemeButton();
}

document.addEventListener('DOMContentLoaded', () => {
  applyUserSettings();
  updateThemeButton();
  renderQuestions();

  const themeToggle = document.getElementById('themeToggle');
  const themeToggleFixed = document.getElementById('themeToggleFixed');

  themeToggle?.addEventListener('click', toggleTheme);
  themeToggleFixed?.addEventListener('click', toggleTheme);
});
</script>
