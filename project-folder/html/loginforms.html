<!DOCTYPE html>
<html>
<head>
<title>Pathly - Login</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    margin: 0;
    background: #f4f2f0;
}

.container {
    display: grid;
    grid-template-columns: 5fr 3fr;
    width: 100%;
    min-height: 100vh;
}

.login-side {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    background: linear-gradient(870deg, #abaaaa, #a10303f5);
    padding: 40px 32px;
}

.login-side::before {
    content: "";
    position: absolute;
    top: 10px;
    left: 10px;
    width: 120px;
    height: 120px;
    background: 
        url('../assets/wmsulogo_transparentbg.png') no-repeat center;
    background-size: contain;
    background-blend-mode: lighten;
    opacity: 0.9;
    z-index: 0;
}

.login-box {
    width: 80%;
    max-width: 400px;
    padding: 40px;
    border-radius: 15px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(5px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    text-align: center;
    position: relative;
    z-index: 1;
}

h1 {
    color: #8b0000;
    margin-bottom: 10px;
}
.subtitle {
    color: #4d0000;
    font-size: 14px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 14px 12px;
    margin: 6px 0 16px;
    border: 1px solid rgba(0,0,0,0.2);
    border-radius: 9px;
    background: rgba(255,255,255,0.8);
    color: #000;
    font-size: 15px;
}

.form-group {
    margin-bottom: 18px;
    text-align: left;
}

label {
    display: block;
    margin-bottom: 6px;
    font-size: 14px;
    color: #4d0000;
}

.form-links {
    margin-top: 18px;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
}

.form-links a {
    color: #8b0000;
}

button {
    width: 100%;
    padding: 10px;
    background: #8b0000;
    color: #fff;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    font-size: 15px;
    margin-top: 10px;
    transition: 0.3s;
}
button:hover {
    background: #5e0000;
}

a {
    font-size: 12px;
    color: #8b0000;
    text-decoration: none;
}
a:hover {
    text-decoration: underline;
}

.slideshow-side {
    position: relative;
    overflow: hidden;
}

@media (max-width: 900px) {
    .container {
        grid-template-columns: 1fr;
    }
    .login-side,
    .slideshow-side {
        min-height: 50vh;
    }
    .login-side {
        padding: 28px 20px;
    }
}

.bg-slide {
    position: absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    animation: fade 25s infinite;
}

.bg1 { background-image: url('../assets/wmsu\(1\)jpg.jpg'); animation-delay: 0s; }
.bg2 { background-image: url('../assets/wmsu\(2\).jpg'); animation-delay: 2s; }
.bg3 { background-image: url('../assets/wmsu\(3\).jpg'); animation-delay: 4s; }
.bg4 { background-image: url('../assets/wmsu\(4\).jpg'); animation-delay: 6s; }
.bg5 { background-image: url('../assets/wmsu\(5\).jpg'); animation-delay: 8s; }
.bg6 { background-image: url('../assets/wmsu\(6\).jpg'); animation-delay: 10s; }
.bg7 { background-image: url('../assets/wmsu\(7\).jpg'); animation-delay: 12s; }
.bg8 { background-image: url('../assets/wmsu\(8\).jpg'); animation-delay: 14s; }
.bg9 { background-image: url('../assets/wmsu\(9\).jpg'); animation-delay: 16s; }

@keyframes fade {
    0% { opacity: 0; }
    5% { opacity: 1; }
    15% { opacity: 1; }
    20% { opacity: 0; }
    100% { opacity: 0; }
}
</style>
</head>
<body>

<div class="container">
    <div class="login-side">
        <div class="login-box">
            <h1>Pathly</h1>
            <p class="subtitle">Course Recommendation System</p>
                    <form action="main.html">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" type="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" placeholder="Enter your password" required>
                </div>
                <button type="submit">Login</button>
                <p class="form-links">
                    <a href="forgot_password.html">Forgot Password?</a>
                    <a href="signup.html">Create Account</a>
                </p>
            </form>
        </div>
    </div>

    <div class="slideshow-side">
        <div class="bg-slide bg1"></div>
        <div class="bg-slide bg2"></div>
        <div class="bg-slide bg3"></div>
        <div class="bg-slide bg4"></div>
        <div class="bg-slide bg5"></div>
        <div class="bg-slide bg6"></div>
        <div class="bg-slide bg7"></div>
        <div class="bg-slide bg8"></div>
        <div class="bg-slide bg9"></div>
    </div>
</div>

</body>
</html>
