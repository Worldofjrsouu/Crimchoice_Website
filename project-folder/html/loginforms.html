<!DOCTYPE html>
<html>
<head>
<title>Pathly - Login</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    margin: 0;
    background: #f4f2f0;
}

.container {
    display: grid;
    grid-template-columns: 5fr 3fr;
    width: 100%;
    min-height: 100vh;
}

.login-side {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    background: linear-gradient(870deg, #abaaaa, #a10303f5);
    padding: 40px 32px;
}

.login-side::before {
    content: "";
    position: absolute;
    top: 10px;
    left: 10px;
    width: 120px;
    height: 120px;
    background: 
        url('../assets/wmsulogo_transparentbg.png') no-repeat center;
    background-size: contain;
    background-blend-mode: lighten;
    opacity: 0.9;
    z-index: 0;
}

.login-box {
    width: 80%;
    max-width: 400px;
    padding: 40px;
    border-radius: 15px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(5px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    text-align: center;
    position: relative;
    z-index: 1;
}

h1 {
    color: #8b0000;
    margin-bottom: 10px;
}
.subtitle {
    color: #4d0000;
    font-size: 14px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 14px 12px;
    margin: 6px 0 16px;
    border: 1px solid rgba(0,0,0,0.2);
    border-radius: 9px;
    background: rgba(255,255,255,0.8);
    color: #000;
    font-size: 15px;
}

.form-group {
    margin-bottom: 18px;
    text-align: left;
}

label {
    display: block;
    margin-bottom: 6px;
    font-size: 14px;
    color: #4d0000;
}

.form-links {
    margin-top: 18px;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
}

.form-links a {
    color: #8b0000;
}

button {
    width: 100%;
    padding: 10px;
    background: #8b0000;
    color: #fff;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    font-size: 15px;
    margin-top: 10px;
    transition: 0.3s;
}
button:hover {
    background: #5e0000;
}

a {
    font-size: 12px;
    color: #8b0000;
    text-decoration: none;
}
a:hover {
    text-decoration: underline;
}

.slideshow-side {
    position: relative;
    overflow: hidden;
}

@media (max-width: 900px) {
    .container {
        grid-template-columns: 1fr;
    }
    .login-side,
    .slideshow-side {
        min-height: 50vh;
    }
    .login-side {
        padding: 28px 20px;
    }
}

.bg-slide {
    position: absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    animation: fade 25s infinite;
}

.bg1 { background-image: url('../assets/wmsu\(1\)jpg.jpg'); animation-delay: 0s; }
.bg2 { background-image: url('../assets/wmsu\(2\).jpg'); animation-delay: 2s; }
.bg3 { background-image: url('../assets/wmsu\(3\).jpg'); animation-delay: 4s; }
.bg4 { background-image: url('../assets/wmsu\(4\).jpg'); animation-delay: 6s; }
.bg5 { background-image: url('../assets/wmsu\(5\).jpg'); animation-delay: 8s; }
.bg6 { background-image: url('../assets/wmsu\(6\).jpg'); animation-delay: 10s; }
.bg7 { background-image: url('../assets/wmsu\(7\).jpg'); animation-delay: 12s; }
.bg8 { background-image: url('../assets/wmsu\(8\).jpg'); animation-delay: 14s; }
.bg9 { background-image: url('../assets/wmsu\(9\).jpg'); animation-delay: 16s; }

@keyframes fade {
    0% { opacity: 0; }
    5% { opacity: 1; }
    15% { opacity: 1; }
    20% { opacity: 0; }
    100% { opacity: 0; }
}

/* THEME TOGGLE BUTTON */
.theme-toggle-fixed {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #b31313;
  border: none;
  color: white;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(179, 19, 19, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  z-index: 1000;
}

.theme-toggle-fixed:hover {
  background: #7a0000;
  transform: scale(1.1);
  box-shadow: 0 8px 20px rgba(179, 19, 19, 0.4);
}

/* DARK MODE STYLES */
body.theme-dark {
  background: #101010;
}

body.theme-dark .login-side {
  background: linear-gradient(870deg, #2a2a2a, #4a0505);
}

body.theme-dark .login-box {
  background: rgba(31, 31, 31, 0.95);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

body.theme-dark h1 {
  color: #ff8a8a;
}

body.theme-dark .subtitle {
  color: #b3b3b3;
}

body.theme-dark input {
  background: rgba(60, 60, 60, 0.8);
  border-color: rgba(255, 255, 255, 0.2);
  color: #e6e6e6;
}

body.theme-dark input::placeholder {
  color: #888;
}

body.theme-dark .form-group label {
  color: #b3b3b3;
}

body.theme-dark button {
  background: #c33;
}

body.theme-dark button:hover {
  background: #9f1212;
}

body.theme-dark a {
  color: #ff8a8a;
}

body.theme-dark .theme-toggle-fixed {
  background: #c33;
  box-shadow: 0 4px 12px rgba(255, 138, 138, 0.3);
}

body.theme-dark .theme-toggle-fixed:hover {
  background: #9f1212;
  box-shadow: 0 8px 20px rgba(255, 138, 138, 0.4);
}

</style>
</head>
<body>

<!-- THEME TOGGLE BUTTON -->
<button class="theme-toggle-fixed" id="themeToggleFixed" aria-label="Toggle theme">
  <span class="theme-icon">🌙</span>
</button>

<div class="container">
    <div class="login-side">
        <div class="login-box">
            <h1>Pathly</h1>
            <p class="subtitle">Course Recommendation System</p>
                    <form onsubmit="login(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" type="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" placeholder="Enter your password" required>
                </div>
                <button type="submit">Login</button>
                <p class="form-links">
                    <a href="forgot_password.html">Forgot Password?</a>
                    <a href="signup.html">Create Account</a>
                </p>
            </form>
        </div>
    </div>

    <div class="slideshow-side">
        <div class="bg-slide bg1"></div>
        <div class="bg-slide bg2"></div>
        <div class="bg-slide bg3"></div>
        <div class="bg-slide bg4"></div>
        <div class="bg-slide bg5"></div>
        <div class="bg-slide bg6"></div>
        <div class="bg-slide bg7"></div>
        <div class="bg-slide bg8"></div>
        <div class="bg-slide bg9"></div>
    </div>
</div>

<script>
  // Apply user settings from localStorage
  function applyUserSettings() {
    const appearanceData = JSON.parse(localStorage.getItem('pathly_appearance') || '{}');
    document.body.className = document.body.className.replace(/theme-\w+/g, '');
    if (appearanceData.theme === 'dark') {
      document.body.classList.add('theme-dark');
    }
  }

  function updateThemeButton() {
    const isDark = document.body.classList.contains('theme-dark');
    const themeIcon = document.querySelector('.theme-icon');
    if (themeIcon) {
      themeIcon.textContent = isDark ? '☀️' : '🌙';
    }
  }

  function toggleTheme() {
    const appearanceData = JSON.parse(localStorage.getItem('pathly_appearance') || '{}');
    const nextTheme = document.body.classList.contains('theme-dark') ? 'light' : 'dark';
    appearanceData.theme = nextTheme;
    localStorage.setItem('pathly_appearance', JSON.stringify(appearanceData));
    applyUserSettings();
    updateThemeButton();
  }

  document.addEventListener('DOMContentLoaded', function () {
    applyUserSettings();
    updateThemeButton();
    const themeToggleFixed = document.getElementById('themeToggleFixed');
    themeToggleFixed?.addEventListener('click', toggleTheme);
  });

function login(event) {
  event.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  // ADMIN
  if (email === "admin@gmail.com" && password === "456") {
    localStorage.setItem("role", "admin");
    window.location.href = "http://localhost:5173/AdminDashboard";
  }

  // USER
  else if (email === "user@gmail.com" && password === "1234") {
    localStorage.setItem("role", "user");
    window.location.href = "main.html";
  }

  else {
    alert("Invalid login");
  }
}
</script>

</body>
</html>
