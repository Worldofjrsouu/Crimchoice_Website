<!DOCTYPE html>
<html>
<head>

<title>Pathly - Reset Password</title>

<link rel="stylesheet" href="../css/forgot_password.css">

</head>

<body>

<div class="container">

<!-- LEFT SIDE -->
<div class="login-side">

<div class="login-box">

<h1>Reset Password</h1>
<p class="subtitle">Follow the steps to recover your account</p>

<!-- STEP 1 -->
<div class="step active" id="step1">

<div class="form-group">
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="Enter your email" required>
</div>

<button onclick="nextStep(2)">Send Verification Code</button>

<p class="form-links">
    <a href="loginforms.html">Back to Login</a>
</p>

</div>


<!-- STEP 2 -->
<div class="step" id="step2">

<div class="form-group">
    <label for="verificationCode">Verification Code</label>
    <input id="verificationCode" type="text" placeholder="Enter verification code">
</div>

<button onclick="nextStep(3)">Verify Code</button>

<p class="form-links">
    <a href="#" onclick="nextStep(1)">Resend Code</a>
</p>

</div>


<!-- STEP 3 -->
<div class="step" id="step3">

<div class="form-group">
    <label for="newPassword">New Password</label>
    <input id="newPassword" type="password" placeholder="Enter new password">
</div>

<div class="form-group">
    <label for="confirmPassword">Confirm Password</label>
    <input id="confirmPassword" type="password" placeholder="Confirm new password">
</div>

<button onclick="resetDone()">Reset Password</button>

<p class="form-links">
    <a href="loginforms.html">Back to Login</a>
</p>

</div>

</div>

</div>


<!-- RIGHT SIDE SLIDESHOW -->
<div class="slideshow-side">

<div class="bg-slide bg1"></div>
<div class="bg-slide bg2"></div>
<div class="bg-slide bg3"></div>
<div class="bg-slide bg4"></div>
<div class="bg-slide bg5"></div>
<div class="bg-slide bg6"></div>
<div class="bg-slide bg7"></div>
<div class="bg-slide bg8"></div>
<div class="bg-slide bg9"></div>

</div>

</div>

<!-- THEME TOGGLE BUTTON -->
<button class="theme-toggle-fixed" id="themeToggleFixed" aria-label="Toggle theme">
  <span class="theme-icon">🌙</span>
</button>

<script>

function nextStep(step){

document.querySelectorAll(".step").forEach(s=>{
s.classList.remove("active")
})

document.getElementById("step"+step).classList.add("active")

}

function resetDone(){

alert("Password successfully reset!")

window.location.href="loginforms.html"

}

// Apply user settings from localStorage
function applyUserSettings() {
  const appearanceData = JSON.parse(localStorage.getItem('pathly_appearance') || '{}');
  document.body.className = document.body.className.replace(/theme-\w+/g, '');
  if (appearanceData.theme === 'dark') {
    document.body.classList.add('theme-dark');
  }
}

function updateThemeButton() {
  const isDark = document.body.classList.contains('theme-dark');
  const themeIcon = document.querySelector('.theme-icon');
  if (themeIcon) {
    themeIcon.textContent = isDark ? '☀️' : '🌙';
  }
}

function toggleTheme() {
  const appearanceData = JSON.parse(localStorage.getItem('pathly_appearance') || '{}');
  const nextTheme = document.body.classList.contains('theme-dark') ? 'light' : 'dark';
  appearanceData.theme = nextTheme;
  localStorage.setItem('pathly_appearance', JSON.stringify(appearanceData));
  applyUserSettings();
  updateThemeButton();
}

document.addEventListener('DOMContentLoaded', function () {
  applyUserSettings();
  updateThemeButton();
  const themeToggleFixed = document.getElementById('themeToggleFixed');
  themeToggleFixed?.addEventListener('click', toggleTheme);
});

</script>

</body>
</html>
